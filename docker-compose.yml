services:
  frontend:
    image: ghcr.io/iqbalhakims/salesme-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - uploads_data:/app/uploads:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    image: ghcr.io/iqbalhakims/salesme-backend:latest
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  db:
    image: mysql:8
    restart: always
    ports:
      - "3306:3306"
    env_file:
      - ./backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: carcrm
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$DB_PASSWORD --silent 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  uploads_data:
  redis_data:
